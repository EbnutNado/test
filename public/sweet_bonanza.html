<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sweet Bonanza</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #1a0f2a 0%, #0f0a1a 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 700px;
            margin: 0 auto;
            background: linear-gradient(145deg, #2a1a3a, #1a0f2a);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #ff88aa33;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #0a0a1a;
            padding: 10px 20px;
            border-radius: 60px;
        }
        .logo { font-size: 22px; font-weight: bold; background: linear-gradient(135deg, #ff88aa, #ffaa88); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .balance-box { background: #00000066; padding: 5px 16px; border-radius: 40px; }
        .balance-box span:first-child { color: #aaa; font-size: 12px; }
        .balance-box span:last-child { color: #ff88aa; font-size: 20px; font-weight: bold; margin-left: 8px; }
        .bet-panel {
            background: #0a0a1a;
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bet-control { display: flex; align-items: center; gap: 16px; }
        .bet-control button {
            background: #2a2a4a;
            border: none;
            width: 44px;
            height: 44px;
            font-size: 28px;
            border-radius: 30px;
            color: #ff88aa;
            cursor: pointer;
        }
        .bet-control button:active { transform: scale(0.92); }
        .bet-control span { font-size: 28px; font-weight: bold; min-width: 100px; text-align: center; }
        .total-win { font-size: 18px; font-weight: bold; background: #00000066; padding: 6px 16px; border-radius: 40px; }
        .total-win span { color: #ff88aa; font-size: 22px; }
        .game-grid {
            background: #1a1a2a;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 2px #ff88aa33;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            aspect-ratio: 6 / 5;
        }
        .cell {
            background: #2a2a4a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            transition: all 0.1s ease-out;
            box-shadow: 0 2px 6px black;
        }
        @keyframes smoothSpin {
            0% { transform: scale(0.95); opacity: 0.7; background: #ff88aa33; }
            100% { transform: scale(1); opacity: 1; background: #2a2a4a; }
        }
        .cell.spinning { animation: smoothSpin 0.08s infinite; }
        .cell.win { animation: winFlash 0.25s ease-out; }
        @keyframes winFlash {
            0% { transform: scale(1); background: white; box-shadow: 0 0 20px white; }
            100% { transform: scale(1); background: #2a2a4a; }
        }
        .cell.cascade { animation: cascadeFall 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        @keyframes cascadeFall {
            0% { transform: translateY(-50px) rotate(-5deg); opacity: 0; }
            100% { transform: translateY(0) rotate(0); opacity: 1; }
        }
        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff88aa, #ffaa88);
            border: none;
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin-bottom: 16px;
            color: #1a0f2a;
        }
        .spin-btn:active { transform: translateY(2px); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .info-panel {
            background: #0a0a1a;
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .info-panel span:last-child { color: #ff88aa; font-weight: bold; margin-left: 6px; }
        .log-panel {
            background: #0a0a1a;
            border-radius: 24px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
        }
        .log-entry { padding: 4px 8px; border-bottom: 1px solid #2a2a4a; color: #ddd; }
        .log-win { color: #ffaa88; font-weight: bold; }
        .log-free { color: #88ffaa; }
        .log-mult { color: #ffaa44; }
        .multiplier-badge {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            color: #1a0f2a;
            font-size: 48px;
            font-weight: bold;
            padding: 20px 30px;
            border-radius: 60px;
            z-index: 100;
            animation: multiplierPop 0.8s ease-out forwards;
            white-space: nowrap;
        }
        @keyframes multiplierPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; visibility: hidden; }
        }
        .free-spins-notice {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ff88aa, #ffaa88);
            color: #1a0f2a;
            font-size: 36px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 60px;
            z-index: 100;
            animation: fadeOut 2.5s forwards;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="logo">🍬 SWEET BONANZA</div>
        <div class="balance-box"><span>💰 БАЛАНС</span><span id="balance">0</span></div>
    </div>
    <div class="bet-panel">
        <div class="bet-control">
            <button id="betDown">−</button>
            <span id="betValue">100</span>
            <button id="betUp">+</button>
        </div>
        <div class="total-win">🏆 ВЫИГРЫШ <span id="winAmount">0</span></div>
    </div>
    <div class="game-grid"><div class="grid" id="gameGrid"></div></div>
    <div class="info-panel">
        <div><span>🍬 ФРИСПИНЫ:</span><span id="freeSpins">0</span></div>
        <div><span>✨ МНОЖИТЕЛЬ:</span><span id="globalMultiplier">1</span></div>
    </div>
    <button class="spin-btn" id="spinBtn">🍭 SPIN</button>
    <div class="log-panel" id="logPanel"><div class="log-entry">📋 Журнал действий</div></div>
</div>

<script>
    // ==================== КОНФИГ ====================
    const API_URL = "https://prorab.bothost.texh"; // ЗАМЕНИ НА СВОЙ ДОМЕН!
    const SYMBOLS = ['🍎', '🍊', '🍇', '🍒', '🍉', '🍓', '🍬', '🍭'];
    const SCATTER = '🍬';
    const MULTIPLIER_SYMBOL = '🍭';
    
    let tg = window.Telegram.WebApp;
    let userId = null;
    let inTelegram = false;
    
    // Проверяем, запущено ли в Telegram
    try {
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            inTelegram = true;
            userId = tg.initDataUnsafe.user.id;
            tg.expand();
            tg.ready();
        }
    } catch(e) { console.log("Not in Telegram"); }
    
    let balance = 0;
    let currentBet = 100;
    let currentWin = 0;
    let spinning = false;
    let freeSpinsRemaining = 0;
    let freeSpinsMultiplier = 1;
    let currentGrid = [];
    
    const balanceSpan = document.getElementById('balance');
    const betValueSpan = document.getElementById('betValue');
    const winAmountSpan = document.getElementById('winAmount');
    const freeSpinsSpan = document.getElementById('freeSpins');
    const multiplierSpan = document.getElementById('globalMultiplier');
    const spinBtn = document.getElementById('spinBtn');
    const gameGrid = document.getElementById('gameGrid');
    const logPanel = document.getElementById('logPanel');
    
    // ==================== API (только если в Telegram) ====================
    async function apiCall(endpoint, data = null) {
        if (!inTelegram) return null;
        const url = `${API_URL}${endpoint}?user_id=${userId}`;
        const options = { method: data ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
        if (data) options.body = JSON.stringify(data);
        try {
            const res = await fetch(url, options);
            return await res.json();
        } catch(e) {
            console.log("API error:", e);
            return null;
        }
    }
    
    async function loadBalance() {
        if (!inTelegram) {
            balance = 10000;
            balanceSpan.innerText = balance;
            return;
        }
        const data = await apiCall('/api/balance');
        if (data && data.balance !== undefined) {
            balance = data.balance;
            balanceSpan.innerText = balance;
        }
    }
    
    async function saveSpin(winAmount, bet) {
        if (!inTelegram) return;
        await apiCall('/api/save_spin', { win: winAmount, bet: bet });
        if (winAmount > 0) {
            balance += winAmount;
            balanceSpan.innerText = balance;
        }
    }
    
    // ==================== ЛОГИКА ИГРЫ ====================
    function addLog(message, type = 'info') {
        const div = document.createElement('div');
        div.className = 'log-entry';
        if(type === 'win') div.classList.add('log-win');
        if(type === 'free') div.classList.add('log-free');
        if(type === 'mult') div.classList.add('log-mult');
        div.innerHTML = `📌 ${new Date().toLocaleTimeString()} — ${message}`;
        logPanel.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while(logPanel.children.length > 50) logPanel.removeChild(logPanel.children[0]);
    }
    
    function getRandomSymbol() { return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]; }
    
    async function animateSpin() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => cell.classList.add('spinning'));
        for(let step = 0; step < 20; step++) {
            for(let i = 0; i < cells.length; i++) cells[i].innerHTML = getRandomSymbol();
            await new Promise(r => setTimeout(r, 45));
        }
        cells.forEach(cell => cell.classList.remove('spinning'));
        for(let y = 0; y < 5; y++) for(let x = 0; x < 6; x++) {
            const idx = y * 6 + x;
            cells[idx].innerHTML = currentGrid[x][y];
        }
        await new Promise(r => setTimeout(r, 120));
    }
    
    function findClusters(grid) {
        const visited = Array(6).fill().map(() => Array(5).fill(false));
        const clusters = [];
        for(let x = 0; x < 6; x++) {
            for(let y = 0; y < 5; y++) {
                if(visited[x][y]) continue;
                const symbol = grid[x][y];
                if(symbol === SCATTER) continue;
                const queue = [[x, y]];
                const cluster = [];
                visited[x][y] = true;
                while(queue.length) {
                    const [cx, cy] = queue.shift();
                    cluster.push([cx, cy]);
                    const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
                    for(const [dx, dy] of dirs) {
                        const nx = cx + dx, ny = cy + dy;
                        if(nx >= 0 && nx < 6 && ny >= 0 && ny < 5 && !visited[nx][ny] && grid[nx][ny] === symbol) {
                            visited[nx][ny] = true;
                            queue.push([nx, ny]);
                        }
                    }
                }
                if(cluster.length >= 8) clusters.push(cluster);
            }
        }
        return clusters;
    }
    
    function calculateWin(clusters, multiplier) {
        let win = 0;
        for(const cluster of clusters) {
            const count = cluster.length;
            if(count >= 8 && count <= 10) win += currentBet * 0.5;
            else if(count >= 11 && count <= 14) win += currentBet * 1;
            else if(count >= 15 && count <= 19) win += currentBet * 2;
            else if(count >= 20) win += currentBet * 5;
        }
        return Math.floor(win * multiplier);
    }
    
    async function animateWinningCells(clusters) {
        const cells = document.querySelectorAll('.cell');
        for(const cluster of clusters) for(const [x, y] of cluster) {
            const idx = y * 6 + x;
            cells[idx].classList.add('win');
        }
        await new Promise(r => setTimeout(r, 350));
        for(const cluster of clusters) for(const [x, y] of cluster) {
            const idx = y * 6 + x;
            cells[idx].classList.remove('win');
        }
    }
    
    async function animateCascade() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => cell.classList.add('cascade'));
        await new Promise(r => setTimeout(r, 280));
        cells.forEach(cell => cell.classList.remove('cascade'));
    }
    
    async function applyCascade(clusters) {
        if(!clusters.length) return false;
        await animateWinningCells(clusters);
        for(const cluster of clusters) for(const [x, y] of cluster) currentGrid[x][y] = null;
        for(let x = 0; x < 6; x++) {
            const column = [];
            for(let y = 0; y < 5; y++) if(currentGrid[x][y] !== null) column.push(currentGrid[x][y]);
            const missing = 5 - column.length;
            for(let i = 0; i < missing; i++) column.unshift(getRandomSymbol());
            for(let y = 0; y < 5; y++) currentGrid[x][y] = column[y];
        }
        const cells = document.querySelectorAll('.cell');
        for(let y = 0; y < 5; y++) for(let x = 0; x < 6; x++) {
            const idx = y * 6 + x;
            cells[idx].innerHTML = currentGrid[x][y];
        }
        await animateCascade();
        return true;
    }
    
    function countScatters() {
        let count = 0;
        for(let x = 0; x < 6; x++) for(let y = 0; y < 5; y++) if(currentGrid[x][y] === SCATTER) count++;
        return count;
    }
    
    function showMultiplierAnimation(mult) {
        const div = document.createElement('div');
        div.className = 'multiplier-badge';
        div.innerText = `×${mult}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }
    
    function showFreeSpinsAnimation(count) {
        const div = document.createElement('div');
        div.className = 'free-spins-notice';
        div.innerText = `🍬 FREE SPINS! 🍬\n${count} бесплатных вращений!`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }
    
    async function spin() {
        if(spinning) return;
        if(balance < currentBet && freeSpinsRemaining === 0) {
            if(inTelegram) tg.showAlert('❌ Недостаточно средств!');
            else alert('❌ Недостаточно средств!');
            return;
        }
        spinning = true;
        spinBtn.disabled = true;
        const isFreeSpin = freeSpinsRemaining > 0;
        if(!isFreeSpin) {
            balance -= currentBet;
            balanceSpan.innerText = balance;
            addLog(`🎰 СПИН на ${currentBet}₽`, 'info');
        } else {
            addLog(`🎰 ФРИСПИН (осталось ${freeSpinsRemaining})`, 'free');
            freeSpinsRemaining--;
            freeSpinsSpan.innerText = freeSpinsRemaining;
        }
        currentWin = 0;
        winAmountSpan.innerText = '0';
        currentGrid = Array(6).fill().map(() => Array(5).fill().map(() => getRandomSymbol()));
        await animateSpin();
        let roundWin = 0;
        while(true) {
            const clusters = findClusters(currentGrid);
            if(clusters.length === 0) break;
            const win = calculateWin(clusters, isFreeSpin ? freeSpinsMultiplier : 1);
            roundWin += win;
            currentWin = roundWin;
            winAmountSpan.innerText = currentWin;
            if(win > 0) addLog(`🏆 Выигрыш ${win}₽!`, 'win');
            const cascadeResult = await applyCascade(clusters);
            if(!cascadeResult) break;
        }
        if(!isFreeSpin) {
            const scatters = countScatters();
            if(scatters >= 4) {
                showFreeSpinsAnimation(10);
                freeSpinsRemaining = 10;
                freeSpinsMultiplier = 1;
                freeSpinsSpan.innerText = freeSpinsRemaining;
                multiplierSpan.innerText = freeSpinsMultiplier;
                addLog(`🍬 Выпало ${scatters} леденца! +10 фриспинов!`, 'free');
                for(let fs = 0; fs < 10 && freeSpinsRemaining > 0; fs++) {
                    await spin();
                    if(freeSpinsRemaining <= 0) break;
                }
                freeSpinsRemaining = 0;
                freeSpinsMultiplier = 1;
                freeSpinsSpan.innerText = '0';
                multiplierSpan.innerText = '1';
            }
        } else {
            let multFound = false;
            for(let x = 0; x < 6; x++) {
                for(let y = 0; y < 5; y++) {
                    if(currentGrid[x][y] === MULTIPLIER_SYMBOL) {
                        const mult = [2,3,5,8,10,15,20,25,50,100][Math.floor(Math.random()*10)];
                        freeSpinsMultiplier *= mult;
                        multiplierSpan.innerText = freeSpinsMultiplier;
                        showMultiplierAnimation(mult);
                        addLog(`✨ Множитель ×${mult}! Суммарный ×${freeSpinsMultiplier}`, 'mult');
                        multFound = true;
                        break;
                    }
                }
                if(multFound) break;
            }
        }
        if(currentWin > 0) {
            addLog(`💰 Выигрыш ${currentWin}₽.`, 'win');
            await saveSpin(currentWin, currentBet);
        } else if(!isFreeSpin) {
            addLog(`😔 Ничего не выпало.`, 'info');
            await saveSpin(0, currentBet);
        }
        spinning = false;
        spinBtn.disabled = false;
    }
    
    function changeBet(delta) {
        if(spinning) return;
        let newBet = currentBet + delta;
        if(newBet < 100) newBet = 100;
        if(newBet > 5000) newBet = 5000;
        currentBet = newBet;
        betValueSpan.innerText = currentBet;
        addLog(`💰 Ставка изменена на ${currentBet}₽`, 'info');
    }
    
    function renderInitial() {
        gameGrid.innerHTML = '';
        currentGrid = Array(6).fill().map(() => Array(5).fill().map(() => getRandomSymbol()));
        for(let y = 0; y < 5; y++) {
            for(let x = 0; x < 6; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = currentGrid[x][y];
                gameGrid.appendChild(cell);
            }
        }
    }
    
    async function init() {
        await loadBalance();
        renderInitial();
        addLog('🍬 Sweet Bonanza загружен. Удачи!', 'info');
        spinBtn.onclick = spin;
        document.getElementById('betDown').onclick = () => changeBet(-100);
        document.getElementById('betUp').onclick = () => changeBet(100);
    }
    
    init();
</script>
</body>
</html>
